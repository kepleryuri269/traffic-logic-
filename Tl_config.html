<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Traffic Logic</title>

    <link rel="stylesheet" href="css/configuracoes.css">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="config-container">

        <h1 class="titulo">CONFIGURAÇÕES</h1>
        <p class="subtitulo">Personalize sua experiência de jogo</p>

        <div class="config-box">

            <div class="opcao">
                <label>Volume da Música</label>
                <input type="range" min="0" max="100" value="80">
            </div>

            <div class="opcao">
                <label>Volume dos Efeitos</label>
                <input type="range" min="0" max="100" value="70">
            </div>

            <div class="opcao">
                <label>Dificuldade Padrão</label>
                <select>
                    <option>Fácil</option>
                    <option>Médio</option>
                    <option>Difícil</option>
                </select>
            </div>

            <div class="opcao">
                <label>Mostrar Dicas</label>
                <input type="checkbox" checked>
            </div>

        </div>

        <div class="botoes">
            <button class="btn salvar">SALVAR</button>
            <button class="btn voltar">VOLTAR</button>
        </div>

    </div>

</body>
</html>
